name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  hygiene:
    name: Public tree hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate tracked public tree
        run: |
          allowed='^(\.dockerignore|\.env\.example|\.github/|\.gitignore|CODE_OF_CONDUCT\.md|CONTRIBUTING\.md|LICENSE|LICENSES/|NOTICE\.md|README\.md|SECURITY\.md|apps/|docker-compose\.yml|docs/|examples/|fixtures/|packages/|pyproject\.toml|tests/)'
          unexpected="$(git ls-files | grep -Ev "$allowed" || true)"
          if [ -n "$unexpected" ]; then
            echo "$unexpected"
            echo "Tracked public tree contains unexpected paths."
            exit 1
          fi

          unsafe="$(git ls-files | grep -E '(^|/)(\.env|.*\.pem|.*\.key|.*cookie.*|.*cookies.*|.*\.dump|.*\.log|.*\.sqlite3?|.*\.mp4|.*\.mov|.*\.wav|.*\.mp3|.*\.zip)$' | grep -v '^fixtures/sample\.mp4$' || true)"
          if [ -n "$unsafe" ]; then
            echo "$unsafe"
            echo "Tracked public tree contains local/private/generated artifacts."
            exit 1
          fi

      - name: Secret pattern smoke scan
        run: |
          if git grep -n -I -E '(sk-[A-Za-z0-9_-]{20,}|OPENAI_API_KEY=.+|OPENROUTER_API_KEY=.+|HUGGINGFACE_TOKEN=.+|BEGIN (RSA|OPENSSH|PRIVATE) KEY|xox[baprs]-|ghp_[A-Za-z0-9_]{20,}|github_pat_|AKIA[0-9A-Z]{16})' -- . ':!.github/workflows/ci.yml' ':!docs/secrets.md'; then
            echo "Potential secret pattern found in tracked files."
            exit 1
          fi

  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: [hygiene]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install system media tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install Python package
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,video]"

      - name: Python tests
        run: python -m pytest

      - name: Python lint
        run: python -m ruff check apps packages tests

      - name: Python compile
        run: python -m compileall apps/api packages

      - name: API import check
        run: python -c "import cliplab_api.main; print('api import ok')"

      - name: CLI help check
        run: clip-lab --help

      - name: Python dependency audit
        run: python -m pip install pip-audit && python -m pip_audit .

  renderer:
    name: Renderer
    runs-on: ubuntu-latest
    needs: [hygiene]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Renderer TypeScript build
        working-directory: apps/renderer
        run: npm ci && npm run build && npm audit --audit-level=moderate

      - name: Renderer service TypeScript build
        working-directory: apps/renderer/service
        run: npm ci && npm run build && npm audit --audit-level=moderate

  web:
    name: Optional browser UI
    runs-on: ubuntu-latest
    needs: [hygiene]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Web build
        working-directory: apps/web
        run: npm ci && npm run lint && npm run build && npm audit --audit-level=moderate

  docker:
    name: Docker compose smoke
    runs-on: ubuntu-latest
    needs: [backend, renderer, web]
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6

      - name: Create local env file
        run: cp .env.example .env

      - name: Validate compose file
        run: docker compose config

      - name: Docker compose build
        run: docker compose build

      - name: Start API and renderer
        run: docker compose up -d --wait

      - name: Fixture no-render smoke
        run: |
          docker compose exec -T api clip-lab /app/fixtures/sample.mp4 \
            --transcript-json /app/fixtures/sample.transcript.json \
            --output-root /app/output \
            --job-id ci-fixture-no-render \
            --no-render

      - name: Stop compose stack
        if: always()
        run: docker compose down
